<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留学生中文语法纠错系统</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f4f7f9;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh; /* 占满全屏高度 */
        }

        header {
            background-color: #007bff;
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chat-wrapper {
            flex: 1; /* 自动填充剩余空间 */
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 嵌入的 iframe 样式 */
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>基于知识图谱的中文语法纠错助手</h1>
    </header>

    <div class="chat-wrapper">
        <iframe
            src=" https://3dbeb1a7.r39.cpolar.top/chatbot/s0m4Mk8PJiEo52s9"
            style="width: 100%; height: 100%; min-height: 700px"
            frameborder="0"
            allow="microphone">
        </iframe>
    </div>
</div>

</body>
</html>
